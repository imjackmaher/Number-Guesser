  <h1 class="welcome-text">Welcome to Number Guesser</h1>

<div class="input-container">
    <label class="username-label">Enter the Number You are Thinking of:</label>
    <input class="username-input" id="myText" type="number">
    <button class= "myButton" id="myButton">Submit</button><br><br>
    <p class="myp1" id="myp1"></p>
  <div id="keypad" class="hidden">

    <button data-value="1">1</button>
    <button data-value="2">2</button>
    <button data-value="3">3</button>

    <button data-value="4">4</button>
    <button data-value="5">5</button>
    <button data-value="6">6</button>

    <button data-value="7">7</button>
    <button data-value="9">8</button>
    <button data-value="9">9</button>

    <button data-value="0">0</button>
    <button data-value="back">⌫</button>
    <button data-value="clear">C</button>

  </div>
  
</div>

<script src="java.js"></script>
